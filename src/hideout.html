<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/gallery.css">
</head>
<body>

    <nav class="navbar">
        <div class="buttons">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="projects.html">Projects</a>
            <a href="experience.html">Experience</a>
            <a href="works.html">Works</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <main class="book-page">

        <div class="book-header">
            <p class="book-type">Photobook</p>
        </div>

        <div class="book-gallery">
            <img src="images/hideout/hideout1.jpg" alt="">
            <img src="images/hideout/hideout2.jpg" alt="">
            <img src="images/hideout/hideout3.jpg" alt="">
            <img src="images/hideout/hideout4.jpg" alt="">
            <img src="images/hideout/hideout5.jpg" alt="">
            <img src="images/hideout/hideout6.jpg" alt="">
            <img src="images/hideout/hideout7.jpg" alt="">
            <img src="images/hideout/hideout8.jpg" alt="">
            <img src="images/hideout/hideout9.jpg" alt="">
            <img src="images/hideout/hideout10.jpg" alt="">
            <img src="images/hideout/hideout11.jpg" alt="">
            <img src="images/hideout/hideout12.jpg" alt="">
            <img src="images/hideout/hideout13.jpg" alt="">
        </div>
    </main>

    <button id="topBtn">↑</button>

    <script>
        const topBtn = document.getElementById("topBtn");

        window.addEventListener("scroll", () => {
        if (window.scrollY > 300) {
            topBtn.classList.add("show");
        } else {
            topBtn.classList.remove("show");
        }
        });

        topBtn.addEventListener("click", () => {
        window.scrollTo({
            top: 0,
            behavior: "smooth"
        });
        });
    </script>

</body>
</html>
